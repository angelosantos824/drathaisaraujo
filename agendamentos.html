<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendamentos - Clínica Dra. Thaís Araújo</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="dashboard-header">
    <div>
      <h1>Agendamentos</h1>
      <p>Registrar horários, serviços e acompanhar o fluxo diário e mensal.</p>
    </div>
    <nav class="dashboard-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="pacientes.html">Pacientes</a>
      <a href="caixa.html">Fluxo de Caixa</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="index.html" class="button button-secondary">Sair</a>
    </nav>
  </header>

  <br>
  <br>
  <br>
  <br>
  <br>
  <br>
  <br>


    <section class="card table-card">
      <h2>Agenda</h2>
      <div class="filter-row">
        <input type="date" id="filtro-data" />
        <button type="button" id="filtrar-dia" class="button button-outline">Ver por dia</button>
        <button type="button" id="filtrar-mes" class="button button-outline">Ver por mês</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Paciente</th>
              <th>Data</th>
              <th>Horário</th>
              <th>Serviço</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="agendamentos-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <main class="page-content">
    <section class="card form-card">
      <h2>Cadastrar agendamento</h2>
      <form id="agendamento-form">
        <input type="hidden" id="agendamento-id" />

        <label for="paciente-select">Paciente</label>
        <select id="paciente-select" required>
          <option value="">Selecione um paciente</option>
        </select>

        <label for="data-agendamento">Data</label>
        <input type="date" id="data-agendamento" required />

        <label for="hora-agendamento">Horário</label>
        <input type="time" id="hora-agendamento" required />

        <label for="servico">Tipo de serviço</label>
        <input type="text" id="servico" required placeholder="Ex: Consulta, Harmonização" />

        <label for="status">Status</label>
        <select id="status" required>
          <option value="Agendado">Agendado</option>
          <option value="Confirmado">Confirmado</option>
          <option value="Atendido">Atendido</option>
          <option value="Cancelado">Cancelado</option>
          <option value="Faltou">Faltou</option>
        </select>

        <label for="agendamento-observacoes">Observações</label>
        <textarea id="agendamento-observacoes"></textarea>

        <div class="form-actions">
          <button type="submit" class="button button-primary">Salvar</button>
          <button type="button" id="reset-agendamento" class="button button-outline">Limpar</button>
        </div>
      </form>
    </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/agendamentos.js"></script>
</body>
</html>
