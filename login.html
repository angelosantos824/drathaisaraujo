<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Clínica Dra. Thaís Araújo</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page-center">
  <main class="auth-card">
    <h1>Entrar</h1>
    <p>Área interna de gestão para recepção, administração e profissionais.</p>
    <form id="login-form">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="seu@exemplo.com" required />

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="********" required />

      <button type="submit" class="button button-primary">Entrar</button>
    </form>

    <a href="index.html" class="link-secondary">Voltar ao site</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
