<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacientes - Clínica Dra. Thaís Araújo</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="dashboard-header">
    <div>
      <h1>Pacientes</h1>
      <p>Gerencie os dados dos pacientes e histórico básico.</p>
    </div>
    <nav class="dashboard-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="agendamentos.html">Agendamentos</a>
      <a href="caixa.html">Fluxo de Caixa</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="index.html" class="button button-secondary">Sair</a>
    </nav>
  </header>
<br>
<br>
<br>
<br>
<br>
<br>
    <section class="card table-card">
      <h2>Lista de pacientes</h2>
      <input type="text" id="filtro-pacientes" placeholder="Buscar por nome ou telefone" class="input-search" />
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Telefone</th>
              <th>Data de nascimento</th>
              <th>CPF</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="pacientes-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <main class="page-content">
    <section class="card form-card">
      <h2>Cadastrar / atualizar paciente</h2>
      <form id="paciente-form">
        <input type="hidden" id="paciente-id" />
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" required />

        <label for="telefone">Telefone/WhatsApp</label>
        <input type="tel" id="telefone" required />

        <label for="nascimento">Data de nascimento</label>
        <input type="date" id="nascimento" required />

        <label for="cpf">CPF (opcional)</label>
        <input type="text" id="cpf" />

        <label for="endereco">Endereço</label>
        <input type="text" id="endereco" />

        <label for="observacoes">Observações clínicas</label>
        <textarea id="observacoes"></textarea>

        <div class="form-actions">
          <button type="submit" class="button button-primary">Salvar</button>
          <button type="button" id="reset-paciente" class="button button-outline">Limpar</button>
        </div>
      </form>
    </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/pacientes.js"></script>
</body>
</html>
